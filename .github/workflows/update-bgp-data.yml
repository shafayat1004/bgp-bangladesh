name: Update BGP data

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours at minute 37.
    # Times are UTC: 00:37, 04:37, 08:37, 12:37, 16:37, 20:37
    # In Bangladesh time: 06:37, 10:37, 14:37, 18:37, 22:37, 02:37
    - cron: "37 */4 * * *"

permissions:
  contents: write

concurrency:
  group: update-bgp-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run BGP data updater
        run: |
          python scripts/update_bgp_data.py --country BD
      
      - name: Remove raw JSONL file
        run: |
          rm -f data/BD/*.jsonl
      
      - name: Commit and push generated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add data/BD/viz_data.json data/BD/asn_names.json data/BD/metadata.json
      
          if git diff --cached --quiet; then
            echo "No JSON data changes to commit."
            exit 0
          fi
      
          git commit -m "Update BGP data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push